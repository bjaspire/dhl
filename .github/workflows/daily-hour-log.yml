name: Daily Hour Log Report

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # 10:12 AM NPT (UTC+5:45) = 04:27 UTC, Monday–Friday
    - cron: "27 4 * * 1-5"

  workflow_dispatch:

concurrency:
  group: hour-log-report
  cancel-in-progress: false

jobs:
  send-notification:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Send Notification
        env:
          GCHAT_WEBHOOK_URL: ${{ secrets.GCHAT_WEBHOOK_URL }}
          JIRA_URL: ${{ secrets.JIRA_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
          JIRA_BOARD_ID: ${{ secrets.JIRA_BOARD_ID || '193' }}
        run: |
          if [ -z "$GCHAT_WEBHOOK_URL" ]; then
            echo "Webhook not configured. Skipping."
            exit 0
          fi

          python chat.py