name: Daily Hour Log Report

on:
  schedule:
    # 10:15 AM NPT (04:30 UTC), Monday to Friday
    - cron: '30 4 * * 1-5'
    # 11:30 AM NPT (05:45 UTC), Monday to Friday
    - cron: '30 2 * * 1-5'
  # workflow_dispatch:
  #   inputs:
  #     board_id:
  #       description: 'Jira Board ID'
  #       required: false
  #       default: '193'
  #       type: string
  #     target_date:
  #       description: 'Target Date (YYYY-MM-DD)'
  #       required: false
  #       default: ''
  #       type: string

# No special permissions needed since we are not deploying to Pages anymore

jobs:
  send-notification:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Send Notification to Google Chat
        env:
          GCHAT_WEBHOOK_URL: ${{ secrets.GCHAT_WEBHOOK_URL }}
          JIRA_URL: ${{ secrets.JIRA_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
          JIRA_BOARD_ID: ${{ inputs.board_id || secrets.JIRA_BOARD_ID || vars.JIRA_BOARD_ID || '193' }}
        run: |
          if [ -z "$GCHAT_WEBHOOK_URL" ]; then
            echo "Warning: GCHAT_WEBHOOK_URL secret is not set. Skipping notification."
            exit 0
          fi
          
          python chat.py
