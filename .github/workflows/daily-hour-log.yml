name: Daily Hour Log Report

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # Run every 5 minutes Monday–Friday
    - cron: "*/5 * * * 1-5"

  workflow_dispatch:

concurrency:
  group: hour-log-report
  cancel-in-progress: false

jobs:
  send-notification:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Determine if job should run
        id: scheduler
        run: |
          CURRENT_TIME=$(TZ=Asia/Kathmandu date +"%H:%M")
          echo "Current Nepal Time: $CURRENT_TIME"

          TARGET_TIMES=("09:45" "09:50" "10:00")

          RUN_JOB=false
          for t in "${TARGET_TIMES[@]}"; do
            if [[ "$CURRENT_TIME" == "$t" ]]; then
              RUN_JOB=true
            fi
          done

          echo "run_job=$RUN_JOB" >> $GITHUB_OUTPUT

      - name: Install dependencies
        if: steps.scheduler.outputs.run_job == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Send Notification
        if: steps.scheduler.outputs.run_job == 'true'
        env:
          GCHAT_WEBHOOK_URL: ${{ secrets.GCHAT_WEBHOOK_URL }}
          JIRA_URL: ${{ secrets.JIRA_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
          JIRA_BOARD_ID: ${{ secrets.JIRA_BOARD_ID || '193' }}
        run: |
          if [ -z "$GCHAT_WEBHOOK_URL" ]; then
            echo "Webhook not configured. Skipping."
            exit 0
          fi

          python chat.py